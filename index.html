<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <meta name="description" content="智慧借款管理系統 - 多人協作雲端版">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Monex">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Monex | 智慧借款管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
    }
    input[type=number]::-webkit-inner-spin-button {
      opacity: 1;
      height: 30px;
    }
    dialog::backdrop {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(3px);
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }
    .status-badge {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.75rem;
      font-weight: bold;
      z-index: 50;
    }
    .status-online {
      background: #10b981;
      color: white;
    }
    .status-offline {
      background: #ef4444;
      color: white;
    }
    .login-container {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
      overflow-y: auto;
    }
    .login-box {
      background: white;
      padding: 2rem 1.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      max-width: 380px;
      width: 100%;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: white;
      border: 2px solid #e5e7eb;
      padding: 0.875rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      font-size: 0.9375rem;
    }
    .google-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
      transform: translateY(-1px);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .user-menu {
      position: relative;
    }
    .user-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.5rem;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      min-width: 200px;
      display: none;
      z-index: 50;
    }
    .user-dropdown.show {
      display: block;
    }
    @media (max-width: 768px) {
      .status-badge {
        top: 0.5rem;
        right: 0.5rem;
        font-size: 0.65rem;
        padding: 0.375rem 0.75rem;
      }
      .login-box {
        padding: 1.5rem 1.25rem;
        max-width: 90%;
      }
      .login-box h1 {
        font-size: 2rem;
      }
      .google-btn {
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
      }
      body {
        padding: 0.5rem;
      }
    }
    @media (max-width: 480px) {
      .login-box {
        padding: 1.25rem 1rem;
      }
      .login-box h1 {
        font-size: 1.75rem;
      }
      .login-box p {
        font-size: 0.875rem;
      }
    }
    /* PWA 安裝提示 */
    .install-prompt {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      z-index: 100;
      display: none;
      max-width: 90%;
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }
    .install-prompt.show {
      display: block;
    }
  </style>
</head>
<body class="p-4 md:p-8 text-slate-800 pb-24">
  <!-- PWA 安裝提示 -->
  <div id="installPrompt" class="install-prompt">
    <div class="flex items-center gap-3">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
      </svg>
      <div class="flex-1">
        <div class="font-bold text-sm">安裝 Monex 到主畫面</div>
        <div class="text-xs opacity-90">離線也能使用</div>
      </div>
      <button onclick="installPWA()" class="bg-white text-indigo-600 px-4 py-2 rounded-lg font-bold text-sm hover:bg-gray-100 transition">
        安裝
      </button>
      <button onclick="dismissInstallPrompt()" class="text-white opacity-75 hover:opacity-100">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- 登入畫面 -->
  <div id="loginContainer" class="login-container">
    <div class="login-box">
      <div class="text-center mb-6">
        <div class="bg-indigo-600 text-white p-3 rounded-xl shadow-lg inline-block mb-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Monex</h1>
        <p class="text-slate-500">智慧借款管理系統</p>
      </div>
      <button onclick="signInWithGoogle()" class="google-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        使用 Google 帳號登入
      </button>
      <p class="text-xs text-slate-400 text-center mt-4">登入即表示您同意使用條款</p>
    </div>
  </div>

  <!-- 主應用程式（登入後顯示） -->
  <div id="appContainer" style="display: none;">
  <div id="statusBadge" class="status-badge status-offline">🔄 連線中...</div>
  
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-slate-800">Monex</h1>
          <p class="text-xs text-slate-400">☁️ 多人協作版</p>
        </div>
      </div>
      <div class="user-menu">
        <button onclick="toggleUserMenu()" class="flex items-center gap-2 bg-white border border-slate-200 rounded-lg px-3 py-2 hover:bg-slate-50 transition">
          <img id="userAvatar" src="" alt="User" class="w-8 h-8 rounded-full">
          <div class="text-left hidden md:block">
            <div id="userName" class="text-sm font-medium text-slate-800"></div>
            <div id="userRole" class="text-xs text-slate-500"></div>
          </div>
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        <div id="userDropdown" class="user-dropdown">
          <div class="p-3 border-b border-slate-100">
            <div class="text-sm font-medium text-slate-800" id="dropdownName"></div>
            <div class="text-xs text-slate-500" id="dropdownEmail"></div>
          </div>
          <button onclick="openAccessControl()" class="w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 flex items-center gap-2" id="accessControlBtn">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            權限管理
          </button>
          <button onclick="signOut()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            登出
          </button>
        </div>
      </div>
    </div>
    <div id="statsDashboard" class="grid grid-cols-3 gap-2 mb-6">
      </div>
    <details class="bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 group" open>
      <summary class="p-4 cursor-pointer list-none flex justify-between items-center font-bold text-slate-600 hover:text-indigo-600">
        <span>➕ 新增借款合約</span>
        <span class="transition group-open:rotate-180">▼</span>
      </summary>
      <div class="p-6 pt-0 border-t border-slate-100 mt-4">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">借款對象</label>
            <input type="text" id="borrower" placeholder="姓名" class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">借款金額</label>
            <input type="number" id="amount" step="1000" placeholder="0" class="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">借款日期</label>
            <input type="date" id="loanDate" class="w-full border rounded-lg p-2.5 outline-none">
          </div>
          <div class="flex gap-2">
            <div class="w-2/3">
              <label class="block text-xs font-medium text-slate-500 mb-1">利率 (%)</label>
              <input type="number" id="interestRate" placeholder="%" class="w-full border rounded-lg p-2.5 outline-none">
            </div>
            <div class="w-1/3">
              <label class="block text-xs font-medium text-slate-500 mb-1">週期</label>
              <select id="interestType" onchange="togglePayDayInput('new')" class="w-full border rounded-lg p-2.5 bg-white outline-none">
                <option value="月">月息</option>
                <option value="週">週息</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">約定繳息時間</label>
            <div id="monthlyInput_new">
              <input type="number" id="payDayDate" placeholder="每月幾號 (1-31)" min="1" max="31" class="w-full border rounded-lg p-2.5 outline-none">
            </div>
            <select id="payDayWeek_new" class="hidden w-full border rounded-lg p-2.5 bg-white outline-none">
              <option value="1">每週一</option>
              <option value="2">每週二</option>
              <option value="3">每週三</option>
              <option value="4">每週四</option>
              <option value="5">每週五</option>
              <option value="6">每週六</option>
              <option value="0">每週日</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">繳息機制</label>
            <select id="roundingType" class="w-full border rounded-lg p-2.5 bg-white outline-none">
              <option value="normal">正常制</option>
              <option value="round">取整數制 (百位)</option>
            </select>
          </div>
        
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">手續費 (開辦費) 💰</label>
            <input type="number" id="serviceFee" placeholder="乙方預領" min="0" step="100" class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">甲方分潤比例 (%) 📊</label>
            <input type="number" id="investorSplit" value="50" min="0" max="100" step="1" class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-indigo-500">
            <p class="text-[10px] text-slate-400 mt-1">目前你領取的佔比</p>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">備註</label>
            <input type="text" id="notes" placeholder="ex:本票編號：XXXXXX" class="w-full border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-indigo-500">
          </div>

          <div class="lg:col-span-3 bg-slate-50 p-4 rounded-xl border border-dashed border-slate-300">
            <label class="block text-xs font-bold text-slate-500 mb-3">🛡️ 法律文件備查 (確保權益)</label>
            <div class="flex flex-wrap gap-4">
              <label class="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" id="hasNote" class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500">
                <span class="text-sm text-slate-600 group-hover:text-indigo-600">已收本票正本</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" id="hasIdCopy" class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500">
                <span class="text-sm text-slate-600 group-hover:text-indigo-600">已留身分證影本</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer group">
                <input type="checkbox" id="hasRemitRecord" class="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500">
                <span class="text-sm text-slate-600 group-hover:text-indigo-600">已留匯款截圖</span>
              </label>
            </div>
          </div>
          
          <div class="lg:col-span-3">
            <button onclick="addLoan()" class="w-full bg-indigo-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">
              建立合約
            </button>
          </div>
        </div>
      </div>
    </details>

    <div class="flex flex-wrap items-center gap-3 mb-4 bg-slate-100 p-3 rounded-xl border border-slate-200">
      <span class="text-sm font-bold text-slate-500 ml-1">排序依據：</span>
      <select id="sortBy" onchange="renderLoans()" class="bg-white border border-slate-300 text-sm rounded-lg p-2 outline-none">
        <option value="date">📅 借款日期</option>
        <option value="payDay">📆 繳息日期</option>
        <option value="amount">💰 借款金額</option>
        <option value="remaining">💳 剩餘本金</option>
        <option value="name">👤 借款人姓名</option>
      </select>
      <button id="sortOrderBtn" onclick="toggleSortOrder()" class="bg-white border border-slate-300 text-slate-600 px-3 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 flex items-center gap-1">
        <span id="sortIcon">⬇️</span>
        <span id="sortText">降冪</span>
      </button>
      <div class="h-6 w-px bg-slate-300"></div>
      <span class="text-sm font-bold text-slate-500">篩選：</span>
      <select id="filterStatus" onchange="renderLoans()" class="bg-white border border-slate-300 text-sm rounded-lg p-2 outline-none">
        <option value="active" selected>🔄 進行中</option>
        <option value="all">📋 全部顯示</option>
        <option value="completed">✅ 已結清</option>
      </select>
      <div class="h-6 w-px bg-slate-300"></div>
      <span class="text-sm font-bold text-slate-500">搜尋：</span>
      <input type="text" id="searchInput" placeholder="輸入借款人姓名..." oninput="renderLoans()" class="bg-white border border-slate-300 text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-indigo-500 w-48">
    </div>

    <div id="loanList" class="space-y-6"></div>
  </div>
  </div>

  <!-- 權限管理對話框 -->
  <dialog id="accessModal" class="rounded-xl shadow-2xl p-0 w-full max-w-md overflow-hidden">
    <div class="bg-white p-6">
      <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
        權限管理
      </h3>
      <div class="mb-4">
        <label class="block text-sm text-slate-600 mb-2">新增授權使用者</label>
        <div class="flex gap-2">
          <input type="email" id="newUserEmail" placeholder="輸入 Email 地址" class="flex-1 border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          <button onclick="addAuthorizedUser()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700">
            新增
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="block text-sm text-slate-600 mb-2">已授權使用者</label>
        <div id="authorizedUsersList" class="space-y-2 max-h-60 overflow-y-auto">
          <!-- 動態載入 -->
        </div>
      </div>
      <div class="mt-6 flex justify-end">
        <button onclick="document.getElementById('accessModal').close()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg">
          關閉
        </button>
      </div>
    </div>
  </dialog>

  <dialog id="actionModal" class="rounded-xl shadow-2xl p-0 w-full max-w-sm overflow-hidden">
    <div class="bg-white p-6">
      <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-4">交易紀錄</h3>
      <input type="hidden" id="modalLoanId">
      <input type="hidden" id="modalType">
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-gray-500 mb-1">交易日期</label>
          <input type="date" id="modalDate" class="w-full border rounded p-2 outline-none focus:border-indigo-500">
        </div>
        <div>
          <label class="block text-sm text-gray-500 mb-1">金額</label>
          <input type="number" id="modalAmount" class="w-full border rounded p-2 outline-none focus:border-indigo-500 text-lg font-bold">
          <p id="autoCalcHint" class="text-xs text-amber-500 mt-1 hidden">💡 已自動填入：原始本金 × 利率</p>
        </div>
      </div>
      <div class="mt-6 flex gap-3">

  <script>
    // ========== Service Worker 註冊 ==========
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((registration) => {
            console.log('ServiceWorker 註冊成功:', registration.scope);
          })
          .catch((error) => {
            console.log('ServiceWorker 註冊失敗:', error);
          });
      });
    }

    // ========== PWA 安裝功能 ==========
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // 顯示安裝提示（延遲3秒後顯示）
      setTimeout(() => {
        if (!localStorage.getItem('pwaInstallDismissed')) {
          document.getElementById('installPrompt').classList.add('show');
        }
      }, 3000);
    });

    async function installPWA() {
      if (!deferredPrompt) {
        alert('此瀏覽器不支援安裝，或已經安裝了');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        console.log('使用者安裝了 PWA');
      }
      deferredPrompt = null;
      document.getElementById('installPrompt').classList.remove('show');
    }

    function dismissInstallPrompt() {
      document.getElementById('installPrompt').classList.remove('show');
      localStorage.setItem('pwaInstallDismissed', 'true');
    }

    // ========== Firebase 配置區 ==========
    const firebaseConfig = {
      apiKey: "AIzaSyD2fg3BkDV9GDlXHQZM5BEoyLKE-7D_2TM",
      authDomain: "monex-loan-manager.firebaseapp.com",
      databaseURL: "https://monex-loan-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "monex-loan-manager",
      storageBucket: "monex-loan-manager.firebasestorage.app",
      messagingSenderId: "1015498422004",
      appId: "1:1015498422004:web:d4a5cb27d7587ed39650a1",
      measurementId: "G-LT6QRW0550"
    };

    // 初始化 Firebase
    let database;
    let loansRef;
    let accessRef;
    let auth;
    let currentUser = null;
    let isOwner = false;
    
    try {
      console.log('🔄 開始初始化 Firebase...');
      firebase.initializeApp(firebaseConfig);
      database = firebase.database();
      auth = firebase.auth();
      console.log('✅ Firebase 初始化成功');
      
      // 監聽登入狀態
      console.log('🔄 設定 Auth 監聽器...');
      auth.onAuthStateChanged(async (user) => {
        console.log('🔔 Auth 狀態變更:', user ? `已登入 (${user.email})` : '未登入');
        
        if (user) {
          currentUser = user;
          try {
            await checkUserAccess(user);
          } catch (error) {
            console.error('❌ 權限檢查失敗:', error);
            alert('權限檢查失敗，請稍後再試');
            await auth.signOut();
          }
        } else {
          currentUser = null;
          showLoginScreen();
        }
      });
      
    } catch (error) {
      console.error('❌ Firebase 初始化失敗:', error);
      alert('⚠️ 無法連接到雲端資料庫，請檢查網路連線或稍後再試\n錯誤: ' + error.message);
      document.getElementById('loginContainer').style.display = 'flex';
    }

    // Google 登入
    async function signInWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        // 設定持久化登入狀態
        await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        await auth.signInWithPopup(provider);
      } catch (error) {
        console.error('登入失敗:', error);
        alert('登入失敗，請稍後再試');
      }
    }

    // 登出
    async function signOut() {
      if (confirm('確定要登出嗎？')) {
        await auth.signOut();
      }
    }

    // 檢查使用者權限 (診斷與容錯版)
    async function checkUserAccess(user) {
      try {
        console.log("🔄 正在嘗試讀取權限表...");
        // 嘗試讀取 access 節點
        const accessSnapshot = await database.ref('access').once('value');
        const accessData = accessSnapshot.val() || {};
        
        console.log("✅ 權限表讀取成功:", accessData);

        // 1. 檢查是否為擁有者 (資料庫完全沒 owner 時，第一個登入者自動獲得)
        if (!accessData.owner) {
          console.log("🐣 偵測到系統尚未初始化，正在將您設為擁有者...");
          await database.ref('access/owner').set(user.email);
          isOwner = true;
        } else if (accessData.owner === user.email) {
          console.log("👑 身分確認：擁有者 (甲方)");
          isOwner = true;
        } else {
          // 2. 檢查是否在授權名單中
          const authorizedUsers = accessData.authorizedUsers || [];
          // 這裡使用 includes 檢查 Email
          if (authorizedUsers.includes(user.email)) {
            console.log("🤝 身分確認：授權協作者 (乙方)");
            isOwner = false;
          } else {
            console.warn("🚫 權限不足：您的 Email 不在授權名單內");
            alert(`⚠️ 權限拒絕\n\n您的帳號 (${user.email}) 尚未獲得授權。\n請聯繫管理員將您加入名單。`);
            await auth.signOut();
            return;
          }
        }
        
        // 3. 權限檢查通過，進入主程式
        console.log("🚀 權限檢查通過，啟動應用程式...");
        initializeApp(user);

      } catch (error) {
        // 🔥 這裡會捕捉 Permission Denied 錯誤
        console.error("❌ Firebase 讀取錯誤:", error);
        
        let errorMsg = "無法存取資料庫。";
        if (error.code === 'PERMISSION_DENIED') {
          errorMsg = "⚠️ 資料庫存取被拒 (Permission Denied)。\n這通常是 Firebase Rules 設定錯誤，請確認 access 節點允許讀取。";
        }
        
        alert(`系統登入失敗\n\n訊息: ${errorMsg}\n\n詳細資訊: ${error.message}`);
        // 失敗時強制登出，避免卡在半登入狀態
        await auth.signOut();
      }
    }

    // 初始化應用程式
    function initializeApp(user) {
      loansRef = database.ref('loans');
      accessRef = database.ref('access');
      
      // 顯示使用者資訊
      document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/40';
      document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
      document.getElementById('userRole').textContent = isOwner ? '甲方 (擁有者)' : '乙方 (協作者)';
      document.getElementById('dropdownName').textContent = user.displayName || user.email.split('@')[0];
      document.getElementById('dropdownEmail').textContent = user.email;
      
      // 只有擁有者可以看到權限管理按鈕
      document.getElementById('accessControlBtn').style.display = isOwner ? 'flex' : 'none';
      
      // 顯示主應用程式
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('appContainer').style.display = 'block';
      
      updateStatus('online');
      
      // 監聽資料變化
      loansRef.on('value', (snapshot) => {
        const data = snapshot.val();
        loans = data ? Object.values(data).map(loan => ({
          ...loan,
          repayments: loan.repayments || [],
          interestPayments: loan.interestPayments || []
        })) : [];
        renderLoans();
      });
    }

    // 顯示登入畫面
    function showLoginScreen() {
      document.getElementById('loginContainer').style.display = 'flex';
      document.getElementById('appContainer').style.display = 'none';
    }

    // 開啟權限管理對話框
    async function openAccessControl() {
      if (!isOwner) {
        alert('只有擁有者可以管理權限');
        return;
      }
      
      const accessSnapshot = await accessRef.once('value');
      const accessData = accessSnapshot.val() || {};
      const authorizedUsers = accessData.authorizedUsers || [];
      const owner = accessData.owner || '';
      
      const listEl = document.getElementById('authorizedUsersList');
      listEl.innerHTML = '';
      
      // 顯示擁有者
      listEl.innerHTML += `
        <div class="flex items-center justify-between p-2 bg-indigo-50 rounded border border-indigo-200">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
            </svg>
            <div>
              <div class="text-sm font-medium text-slate-800">${owner}</div>
              <div class="text-xs text-indigo-600">擁有者</div>
            </div>
          </div>
        </div>
      `;
      
      // 顯示授權使用者
      if (authorizedUsers.length === 0) {
        listEl.innerHTML += '<div class="text-sm text-slate-400 text-center py-4">尚未授權任何使用者</div>';
      } else {
        authorizedUsers.forEach(email => {
          listEl.innerHTML += `
            <div class="flex items-center justify-between p-2 bg-slate-50 rounded border border-slate-200">
              <div class="text-sm text-slate-700">${email}</div>
              <button onclick="removeAuthorizedUser('${email}')" class="text-red-500 hover:text-red-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
              </button>
            </div>
          `;
        });
      }
      
      document.getElementById('accessModal').showModal();
    }

    // 新增授權使用者
    async function addAuthorizedUser() {
      const email = document.getElementById('newUserEmail').value.trim().toLowerCase();
      if (!email) {
        alert('請輸入 Email 地址');
        return;
      }
      
      // 驗證 Email 格式
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        alert('請輸入有效的 Email 地址');
        return;
      }
      
      const accessSnapshot = await accessRef.once('value');
      const accessData = accessSnapshot.val() || {};
      const authorizedUsers = accessData.authorizedUsers || [];
      const owner = accessData.owner || '';
      
      if (email === owner) {
        alert('此使用者已是擁有者');
        return;
      }
      
      if (authorizedUsers.includes(email)) {
        alert('此使用者已在授權名單中');
        return;
      }
      
      authorizedUsers.push(email);
      await accessRef.child('authorizedUsers').set(authorizedUsers);
      
      document.getElementById('newUserEmail').value = '';
      openAccessControl(); // 重新載入列表
    }

    // 切換使用者選單
    function toggleUserMenu() {
      const dropdown = document.getElementById('userDropdown');
      dropdown.classList.toggle('show');
    }

    // 點擊外部關閉選單
    document.addEventListener('click', function(event) {
      const userMenu = document.querySelector('.user-menu');
      const dropdown = document.getElementById('userDropdown');
      if (dropdown && userMenu && !userMenu.contains(event.target)) {
        dropdown.classList.remove('show');
      }
    });

    function updateStatus(status) {
      const badge = document.getElementById('statusBadge');
      if (status === 'online') {
        badge.textContent = '✅ 已連線';
        badge.className = 'status-badge status-online';
      } else {
        badge.textContent = '❌ 離線';
        badge.className = 'status-badge status-offline';
      }
    }

    // ========== 應用程式邏輯 ==========
    document.getElementById('loanDate').valueAsDate = new Date();
    document.getElementById('modalDate').valueAsDate = new Date();
    let loans = [];
    let isDesc = true;

    function togglePayDayInput(context) {
      const type = document.getElementById(context === 'new' ? 'interestType' : 'editRateType').value;
      const monthDiv = document.getElementById(context === 'new' ? 'monthlyInput_new' : 'monthlyInput_edit');
      const weekSel = document.getElementById(context === 'new' ? 'payDayWeek_new' : 'editPayDayWeek');
      if (type === '月') {
        monthDiv.classList.remove('hidden');
        weekSel.classList.add('hidden');
      } else {
        monthDiv.classList.add('hidden');
        weekSel.classList.remove('hidden');
      }
    }

    function toggleSortOrder() {
      isDesc = !isDesc;
      document.getElementById('sortIcon').textContent = isDesc ? '⬇️' : '⬆️';
      document.getElementById('sortText').textContent = isDesc ? '降冪' : '升冪';
      renderLoans();
    }

    function getSortedLoans() {
      const criteria = document.getElementById('sortBy').value;
      const filterStatus = document.getElementById('filterStatus').value;
      const searchKeyword = document.getElementById('searchInput').value.toLowerCase().trim();
      
      let filtered = loans;
      
      // 篩選狀態
      if (filterStatus === 'active') {
        filtered = filtered.filter(loan => {
          const totalRepaid = loan.repayments.reduce((sum, r) => sum + r.amount, 0);
          return loan.originalAmount - totalRepaid > 0;
        });
      } else if (filterStatus === 'completed') {
        filtered = filtered.filter(loan => {
          const totalRepaid = loan.repayments.reduce((sum, r) => sum + r.amount, 0);
          return loan.originalAmount - totalRepaid <= 0;
        });
      }
      
      // 搜尋關鍵字
      if (searchKeyword) {
        filtered = filtered.filter(loan => 
          loan.borrower.toLowerCase().includes(searchKeyword)
        );
      }
      
      return [...filtered].sort((a, b) => {
        let valA, valB;
        if (criteria === 'amount') {
          valA = a.originalAmount;
          valB = b.originalAmount;
        } else if (criteria === 'remaining') {
          const remainingA = a.originalAmount - a.repayments.reduce((sum, r) => sum + r.amount, 0);
          const remainingB = b.originalAmount - b.repayments.reduce((sum, r) => sum + r.amount, 0);
          valA = remainingA;
          valB = remainingB;
        } else if (criteria === 'payDay') {
          const getPayDayValue = (loan) => {
            if (!loan.payDay) return 9999;
            if (loan.rateType === '週') {
              return loan.payDay == 0 ? 7 : parseInt(loan.payDay);
            } else {
              return parseInt(loan.payDay);
            }
          };
          valA = getPayDayValue(a);
          valB = getPayDayValue(b);
        } else if (criteria === 'name') {
          valA = a.borrower.toLowerCase();
          valB = b.borrower.toLowerCase();
        } else {
          valA = new Date(a.loanDate).getTime();
          valB = new Date(b.loanDate).getTime();
        }
        if (valA < valB) return isDesc ? 1 : -1;
        if (valA > valB) return isDesc ? -1 : 1;
        return 0;
      });
    }

    function addLoan() {
      // 1. 抓取基本欄位資料
      const borrower = document.getElementById('borrower').value;
      const amount = parseFloat(document.getElementById('amount').value);
      const loanDate = document.getElementById('loanDate').value;
      const rate = document.getElementById('interestRate').value;
      const type = document.getElementById('interestType').value;
      const payDay = type === '月' ? document.getElementById('payDayDate').value : document.getElementById('payDayWeek_new').value;
      const roundingType = document.getElementById('roundingType').value;
      const notes = document.getElementById('notes').value;
      
      // 💡 2. [新增] 抓取法律文件勾選狀態
      const hasNote = document.getElementById('hasNote').checked;
      const hasIdCopy = document.getElementById('hasIdCopy').checked;
      const hasRemitRecord = document.getElementById('hasRemitRecord').checked;

      // 3. 必填欄位驗證
      if (!borrower || !amount || !loanDate) return alert("請填寫必要欄位");
      
      // 4. 構建新合約物件
      const newLoan = {
        id: Date.now(),
        borrower,
        originalAmount: amount,
        
        // 財務分潤欄位
        serviceFee: parseFloat(document.getElementById('serviceFee').value) || 0, 
        investorSplit: parseFloat(document.getElementById('investorSplit').value) || 50, 
        partnerSplit: 100 - (parseFloat(document.getElementById('investorSplit').value) || 50),

        loanDate,
        rate,
        rateType: type,
        payDay,
        roundingType: roundingType || 'normal',
        
        // 風險與狀態
        status: 'active', 
        notes: notes || '',

        // 💡 [新增] 存入法律文件狀態
        hasNote: hasNote,
        hasIdCopy: hasIdCopy,
        hasRemitRecord: hasRemitRecord,

        repayments: [], // 初始化還本紀錄
        interestPayments: [] // 初始化獲利紀錄
      };
      
      // 5. 推送到 Firebase
      loansRef.child(newLoan.id).set(newLoan)
        .then(() => {
          // 6. 清空表單，恢復預設值
          document.getElementById('borrower').value = '';
          document.getElementById('amount').value = '';
          document.getElementById('loanDate').valueAsDate = new Date();
          document.getElementById('interestRate').value = '';
          document.getElementById('interestType').value = '月';
          document.getElementById('payDayDate').value = '';
          document.getElementById('roundingType').value = 'normal';
          document.getElementById('serviceFee').value = '';
          document.getElementById('investorSplit').value = '50';
          document.getElementById('notes').value = '';

          // 💡 [新增] 清空勾選框
          document.getElementById('hasNote').checked = false;
          document.getElementById('hasIdCopy').checked = false;
          document.getElementById('hasRemitRecord').checked = false;

          togglePayDayInput('new');
          
          // 關閉新增區塊 (選用)
          // document.querySelector('details').open = false;
          
          console.log("✅ 合約已成功建立並同步至雲端");
        })
        .catch((error) => {
          console.error("❌ 儲存失敗:", error);
          alert("儲存失敗，請檢查網路連線");
        });
    }

    function deleteLoan(id) {
      if(confirm("確定刪除此紀錄？")) {
        loansRef.child(id).remove();
      }
    }

    function openEditModal(id) {
      const loan = loans.find(l => l.id === id);
      if(!loan) return;
      document.getElementById('editId').value = id;
      document.getElementById('editBorrower').value = loan.borrower;
      document.getElementById('editAmount').value = loan.originalAmount;
      document.getElementById('editLoanDate').value = loan.loanDate;
      document.getElementById('editRate').value = loan.rate;
      document.getElementById('editInvestorSplit').value = loan.investorSplit || 50;
      document.getElementById('editServiceFee').value = loan.serviceFee || 0;
      document.getElementById('editNotes').value = loan.notes || '';
      
      // 💡 [修正] 載入週期與繳息日期
      document.getElementById('editRateType').value = loan.rateType || '月';
      document.getElementById('editRoundingType').value = loan.roundingType || 'normal';
      
      togglePayDayInput('edit'); // 根據週期切換顯示月選單或週選單
      
      if (loan.rateType === '週') {
        document.getElementById('editPayDayWeek').value = loan.payDay;
      } else {
        document.getElementById('editPayDayDate').value = loan.payDay;
      }

      // 載入法律文件狀態
      document.getElementById('editHasNote').checked = loan.hasNote || false;
      document.getElementById('editHasIdCopy').checked = loan.hasIdCopy || false;
      document.getElementById('editHasRemitRecord').checked = loan.hasRemitRecord || false;

      document.getElementById('editModal').showModal();
    }

    function saveEdit() {
      const id = parseInt(document.getElementById('editId').value);
      const loan = loans.find(l => l.id === id);
      if(!loan) return;
      
      loan.borrower = document.getElementById('editBorrower').value;
      loan.originalAmount = parseFloat(document.getElementById('editAmount').value);
      loan.loanDate = document.getElementById('editLoanDate').value;
      loan.rate = document.getElementById('editRate').value;
      loan.investorSplit = parseFloat(document.getElementById('editInvestorSplit').value) || 50;
      loan.partnerSplit = 100 - loan.investorSplit;
      loan.serviceFee = parseFloat(document.getElementById('editServiceFee').value) || 0;
      loan.notes = document.getElementById('editNotes').value;

      // 💡 [修正] 讀取並儲存週期與繳息日
      loan.rateType = document.getElementById('editRateType').value;
      loan.roundingType = document.getElementById('editRoundingType').value;
      loan.payDay = loan.rateType === '月' 
        ? document.getElementById('editPayDayDate').value 
        : document.getElementById('editPayDayWeek').value;

      // 儲存法律文件狀態
      loan.hasNote = document.getElementById('editHasNote').checked;
      loan.hasIdCopy = document.getElementById('editHasIdCopy').checked;
      loan.hasRemitRecord = document.getElementById('editHasRemitRecord').checked;
      
      // 寫回 Firebase
      loansRef.child(id).set(loan)
        .then(() => {
          document.getElementById('editModal').close();
          console.log("✅ 修改已存檔");
        })
        .catch(err => alert("存檔失敗：" + err.message));
    }

    function openModal(type, id) {
      const loan = loans.find(l => l.id === id);
      document.getElementById('modalLoanId').value = id;
      document.getElementById('modalType').value = type;
      document.getElementById('modalDate').valueAsDate = new Date();
      const titleEl = document.getElementById('modalTitle');
      const amountEl = document.getElementById('modalAmount');
      const hintEl = document.getElementById('autoCalcHint');

      if (type === 'principal') {
        titleEl.textContent = `💰 還本金 (${loan.borrower})`;
        titleEl.className = "text-xl font-bold text-emerald-600 mb-4";
        amountEl.value = '';
        hintEl.classList.add('hidden');
      } 
      // 💡 [新增] 再借款邏輯
      else if (type === 'add_principal') {
        titleEl.textContent = `💸 再借出 (${loan.borrower})`;
        titleEl.className = "text-xl font-bold text-red-600 mb-4";
        amountEl.value = '';
        hintEl.classList.add('hidden');
      }
      else {
        titleEl.textContent = `📈 收利息 (${loan.borrower})`;
        titleEl.className = "text-xl font-bold text-amber-600 mb-4";

        if(loan.originalAmount && loan.rate) {
          // 計算包含「加借」後的剩餘本金
          const loanAdditions = (loan.loanAdditions || []).reduce((sum, a) => sum + a.amount, 0);
          const totalRepaid = (loan.repayments || []).reduce((sum, r) => sum + r.amount, 0);
          const remainingPrincipal = loan.originalAmount + loanAdditions - totalRepaid;
          
          let calcInterest = remainingPrincipal * (loan.rate / 100);
          if (loan.roundingType === 'round') calcInterest = Math.ceil(calcInterest / 100) * 100;
          else calcInterest = Math.round(calcInterest);
          
          amountEl.value = calcInterest;
          hintEl.textContent = `💡 已自動填入：總欠本金 $${remainingPrincipal.toLocaleString()} × ${loan.rate}%`;
          hintEl.classList.remove('hidden');
        } else {
          amountEl.value = '';
          hintEl.classList.add('hidden');
        }
      }
      document.getElementById('actionModal').showModal();
    }
    
    function confirmTransaction() {
      const id = parseInt(document.getElementById('modalLoanId').value);
      const type = document.getElementById('modalType').value;
      const date = document.getElementById('modalDate').value;
      const amount = parseFloat(document.getElementById('modalAmount').value);
      if (!amount || amount <= 0) return alert("金額錯誤");
      
      const loan = loans.find(l => l.id === id);
      const record = { amount, date };
      
      if (type === 'principal') {
        loan.repayments = loan.repayments || [];
        loan.repayments.push(record);
      } else if (type === 'add_principal') {
        // 💡 [新增] 存入加借紀錄
        loan.loanAdditions = loan.loanAdditions || [];
        loan.loanAdditions.push(record);
      } else {
        loan.interestPayments = loan.interestPayments || [];
        loan.interestPayments.push(record);
      }
      
      const dateSorter = (a, b) => new Date(b.date) - new Date(a.date);
      if(loan.repayments) loan.repayments.sort(dateSorter);
      if(loan.interestPayments) loan.interestPayments.sort(dateSorter);
      if(loan.loanAdditions) loan.loanAdditions.sort(dateSorter);
      
      loansRef.child(id).set(loan);
      document.getElementById('actionModal').close();
    }

    function checkIsDueToday(loan) {
      if (!loan.payDay) return false;
      const today = new Date();
      return loan.rateType === '月' ? today.getDate() == loan.payDay : today.getDay() == loan.payDay;
    }

    function getWeekName(num) {
      return ['日', '一', '二', '三', '四', '五', '六'][num];
    }

    function renderLoans() {
      const container = document.getElementById('loanList');
      if (!container) return;
      container.innerHTML = '';
      
      let globalRemaining = 0;   
      let globalRiskAmount = 0;  
      let globalProfit = 0;      

      loans.forEach(loan => {
          const totalRepaid = (loan.repayments || []).reduce((sum, r) => sum + r.amount, 0);
          const interestProfit = (loan.interestPayments || []).reduce((sum, r) => sum + r.amount, 0);
          const loanAdditions = (loan.loanAdditions || []).reduce((sum, a) => sum + a.amount, 0); // 💡 抓取加借
          const fee = parseFloat(loan.serviceFee) || 0;
          const splitRatio = (parseFloat(loan.investorSplit) || 50) / 100;

          // 💡 把加借的錢也算進流通本金與風險成本中
          globalRemaining += (loan.originalAmount + loanAdditions - totalRepaid);
          const myFeeShare = fee * splitRatio;
          globalRiskAmount += (loan.originalAmount + loanAdditions - (totalRepaid + myFeeShare));
          globalProfit += (interestProfit * splitRatio) + myFeeShare;
      });

      // 更新看板 UI (優化手機一排顯示)
      const statsEl = document.getElementById('statsDashboard');
      if (statsEl) {
        statsEl.innerHTML = `
          <div class="bg-white p-2 md:p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center text-center">
            <div class="text-[10px] md:text-sm text-slate-500 font-bold mb-1">📋 流通本金</div>
            <div class="text-sm md:text-xl font-black text-slate-800 whitespace-nowrap">$${Math.round(globalRemaining).toLocaleString()}</div>
          </div>
          <div class="bg-indigo-50 p-2 md:p-4 rounded-xl border border-indigo-100 shadow-sm flex flex-col justify-center text-center">
            <div class="text-[10px] md:text-sm text-indigo-600 font-bold mb-1">🛡️ 未回成本</div>
            <div class="text-sm md:text-xl font-black text-indigo-700 whitespace-nowrap">$${Math.round(globalRiskAmount).toLocaleString()}</div>
          </div>
          <div class="bg-amber-50 p-2 md:p-4 rounded-xl border border-amber-100 shadow-sm flex flex-col justify-center text-center">
            <div class="text-[10px] md:text-sm text-amber-600 font-bold mb-1">💰 累計收益</div>
            <div class="text-sm md:text-xl font-black text-amber-600 whitespace-nowrap">$${Math.round(globalProfit).toLocaleString()}</div>
          </div>
        `;
      }

      const sortedLoans = getSortedLoans();
      if (sortedLoans.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-400 py-10">尚無紀錄</div>';
        return;
      }

      sortedLoans.forEach(loan => {
        const repayments = loan.repayments || [];
        const interestPayments = loan.interestPayments || [];
        const loanAdditions = (loan.loanAdditions || []).reduce((sum, a) => sum + a.amount, 0); // 💡 新增加借總額
        const totalRepaid = repayments.reduce((sum, r) => sum + r.amount, 0);
        const remaining = loan.originalAmount - totalRepaid; 
        const borrowerProgress = Math.min(100, Math.round((totalRepaid / loan.originalAmount) * 100));

        const mySplitRatio = parseFloat(loan.investorSplit) || 50; 
        const fee = parseFloat(loan.serviceFee) || 0;
        const interestProfit = interestPayments.reduce((sum, r) => sum + r.amount, 0);
        const totalGrossProfit = interestProfit + fee;
        const my理论Share = Math.round(totalGrossProfit * (mySplitRatio / 100)); 
        const friend理论Share = totalGrossProfit - my理论Share; 

        const myFeeShare = fee * (mySplitRatio / 100);
        const myNetRisk = loan.originalAmount - totalRepaid - myFeeShare;

        const singleInterest = loan.originalAmount * (parseFloat(loan.rate) / 100);
        const bOverdrawn = fee - friend理论Share;
        let suggestA = 0, suggestB = 0;

        if (bOverdrawn > 0) {
            suggestA = Math.min(singleInterest, (singleInterest * (mySplitRatio / 100)) + bOverdrawn);
            suggestB = Math.max(0, singleInterest - suggestA);
        } else {
            suggestA = singleInterest * (mySplitRatio / 100);
            suggestB = singleInterest - suggestA;
        }

        let pBarColor = 'bg-red-500'; 
        if (borrowerProgress >= 100) pBarColor = 'bg-emerald-500';
        else if (borrowerProgress >= 50) pBarColor = 'bg-amber-500';

        const isPaidOff = remaining <= 0;
        const isDue = checkIsDueToday(loan);
        
        const html = `
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden relative group hover:shadow-md transition mb-6">
            <div class="flex justify-between items-start bg-slate-50 border-b border-slate-100 p-4">
              <div>
                <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                  ${loan.borrower}
                  ${isPaidOff ? '<span class="bg-emerald-100 text-emerald-700 text-xs px-2 py-0.5 rounded-full font-bold">已結清</span>' : ''}
                </h3>
                <div class="flex flex-col gap-1 mt-1">
                  <div class="text-[11px] text-slate-400">📅 借款日: ${loan.loanDate}</div>
                  <div class="text-[11px] text-indigo-500 font-bold">
                    📆 約定繳息: ${loan.rateType === '月' ? `每月 ${loan.payDay} 號` : `每週 ${getWeekName(loan.payDay)}`}
                    (${loan.roundingType === 'round' ? '百位制' : '正常制'})
                  </div>
                </div>
                
                <div class="flex flex-wrap gap-1.5 mt-2">
                  ${loan.hasNote ? '<span class="bg-blue-100 text-blue-700 text-[10px] px-1.5 py-0.5 rounded font-bold">🎫 本票已收</span>' : '<span class="bg-slate-100 text-slate-400 text-[10px] px-1.5 py-0.5 rounded">🎫 欠本票</span>'}
                  ${loan.hasIdCopy ? '<span class="bg-indigo-100 text-indigo-700 text-[10px] px-1.5 py-0.5 rounded font-bold">🆔 證件已留</span>' : '<span class="bg-slate-100 text-slate-400 text-[10px] px-1.5 py-0.5 rounded">🆔 缺身分證</span>'}
                  ${loan.hasRemitRecord ? '<span class="bg-emerald-100 text-emerald-700 text-[10px] px-1.5 py-0.5 rounded font-bold">📱 匯款有據</span>' : '<span class="bg-red-50 text-red-400 text-[10px] px-1.5 py-0.5 rounded border border-red-100">⚠️ 缺匯款單</span>'}
                </div>
              </div>
              <div class="text-right flex flex-col items-end gap-1">
                <div class="flex gap-1">
                  ${isOwner ? `
                    <button onclick="openEditModal(${loan.id})" class="p-1.5 text-slate-400 hover:text-indigo-600 rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                    <button onclick="deleteLoan(${loan.id})" class="p-1.5 text-slate-400 hover:text-red-500 rounded"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                  ` : ''}
                </div>
                <span class="text-lg font-bold text-slate-600">$${loan.originalAmount.toLocaleString()}</span>
                ${loan.notes ? `<div class="text-[10px] text-slate-400 max-w-[150px] truncate">📝 ${loan.notes}</div>` : ''}
              </div>
            </div>

            <div class="p-4">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="bg-slate-50 p-3 rounded border border-slate-100 flex flex-col justify-between">
                  <div>
                    <div class="flex justify-between items-center mb-1">
                      <div class="text-xs text-slate-500 font-medium">剩餘客欠 (債權)</div>
                      <div class="text-[10px] ${myNetRisk <= 0 ? 'text-emerald-600' : 'text-indigo-600'} font-bold">
                        ${myNetRisk <= 0 ? '🎉 已完全回本' : `實質未回本: $${Math.round(myNetRisk).toLocaleString()}`}
                      </div>
                    </div>
                    <div class="text-xl font-black ${isPaidOff ? 'text-emerald-500' : 'text-slate-800'}">$${remaining.toLocaleString()}</div>
                  </div>
                  <div class="mt-3">
                    <div class="flex justify-between text-[10px] mb-1">
                      <span class="text-slate-400 font-bold">客戶還款進度</span>
                      <span class="font-bold text-slate-700">${borrowerProgress}%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-2.5">
                      <div class="${pBarColor} h-2.5 rounded-full transition-all duration-700" style="width: ${borrowerProgress}%"></div>
                    </div>
                  </div>
                </div>

                <div class="bg-amber-50 p-3 rounded border border-amber-100 flex flex-col justify-between">
                  <div>
                    <div class="text-xs text-amber-600 font-bold mb-2 flex justify-between">
                      <span>損益結算 (${mySplitRatio}/${100 - mySplitRatio} 拆)</span>
                      <span>甲方比例 ${mySplitRatio}%</span>
                    </div>
                    <div class="text-sm font-bold text-slate-700 flex justify-between py-0.5">
                      <span>甲方(金主)應得:</span>
                      <span class="text-indigo-600">+${my理论Share.toLocaleString()}</span>
                    </div>
                    <div class="text-sm font-bold text-slate-700 flex justify-between py-0.5">
                      <span>乙方(業務)應得:</span>
                      <span class="text-slate-500">+${friend理论Share.toLocaleString()}</span>
                    </div>
                  </div>
                  <div class="mt-2 pt-2 border-t border-amber-200">
                    <div class="text-[10px] font-bold ${bOverdrawn > 0 ? 'text-red-500' : 'text-emerald-600'} flex justify-between">
                        <span>${bOverdrawn > 0 ? `⚠️ 乙方超領預支` : '✅ 帳目分配平衡'}</span>
                        <span>$${Math.round(Math.abs(bOverdrawn)).toLocaleString()}</span>
                    </div>
                    <div class="bg-white/60 p-2 rounded mt-1.5 border border-amber-100 shadow-sm">
                        <div class="text-[9px] text-slate-500 mb-1 font-bold">下次利息分配建議：</div>
                        <div class="flex justify-between text-[10px] font-bold">
                            <span class="text-indigo-600">甲方實領：$${Math.round(suggestA).toLocaleString()}</span>
                            <span class="text-slate-600">乙方實領：$${Math.round(suggestB).toLocaleString()}</span>
                        </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="flex gap-2 mb-3">
                ${isOwner ? `
                  ${!isPaidOff ? `<button onclick="openModal('principal', ${loan.id})" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 shadow-sm transition">還本金</button>` : ''}
                  <button onclick="openModal('add_principal', ${loan.id})" class="flex-1 bg-rose-500 text-white py-2 rounded-lg text-sm font-medium hover:bg-rose-600 shadow-sm transition">再借出</button>
                  <button onclick="openModal('interest', ${loan.id})" class="flex-1 bg-amber-500 text-white py-2 rounded-lg text-sm font-medium hover:bg-amber-600 shadow-sm transition">收利息</button>
                ` : '<div class="text-center w-full py-2 text-slate-400 text-xs italic">乙方帳號僅具備檢視權限</div>'}
              </div>

              <details class="group/detail mt-3">
            <summary class="flex justify-center items-center cursor-pointer text-sm text-slate-400 hover:text-indigo-500 py-1 select-none transition-colors">
              <span>查看詳細交易明細</span>
            </summary>
            <div class="mt-2 grid grid-cols-2 gap-3 text-sm bg-slate-50 p-3 rounded-lg border border-slate-100 max-h-56 overflow-y-auto">
              
              <div class="col-span-2 mb-2 border-b border-slate-200 pb-2">
                <div class="font-bold text-red-600 text-[10px] mb-1 flex items-center gap-1">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                  加借紀錄 (本金增加)
                </div>
                ${(loan.loanAdditions || []).length ? loan.loanAdditions.map(a => `
                  <div class="flex justify-between text-slate-500 py-1 text-[11px]">
                    <span>${a.date}</span>
                    <span class="font-bold text-red-500">+$${a.amount.toLocaleString()}</span>
                  </div>
                `).join('') : '<div class="text-slate-300 text-[10px] py-1 italic">查無增貸紀錄</div>'}
              </div>

              <div>
                <div class="font-bold text-slate-600 mb-2 sticky top-0 bg-slate-50 border-b border-slate-200 text-xs pb-1">還本紀錄</div>
                ${repayments.length ? repayments.map(r => `
                  <div class="flex justify-between text-slate-500 border-b border-slate-100 py-1 text-[11px]">
                    <span>${r.date}</span><span class="font-medium text-emerald-600">-$${r.amount.toLocaleString()}</span>
                  </div>
                `).join('') : '<div class="text-slate-300 text-[10px] py-1">暫無紀錄</div>'}
              </div>

              <div>
                <div class="font-bold text-slate-600 mb-2 sticky top-0 bg-slate-50 border-b border-slate-200 text-xs pb-1">獲利紀錄</div>
                ${interestPayments.length ? interestPayments.map(r => `
                  <div class="flex justify-between text-amber-600 border-b border-slate-100 py-1 text-[11px]">
                    <span>${r.date}</span><span class="font-medium">+$${r.amount.toLocaleString()}</span>
                  </div>
                `).join('') : '<div class="text-slate-300 text-[10px] py-1">暫無紀錄</div>'}
              </div>

            </div>
          </details>
            </div>
          </div>
        `;
        container.innerHTML += html;
      });
    }
    
    // 移除授權使用者
    async function removeAuthorizedUser(email) {
      if (!confirm(`確定要移除 ${email} 的訪問權限嗎？`)) {
        return;
      }
      
      const accessSnapshot = await accessRef.once('value');
      const accessData = accessSnapshot.val() || {};
      let authorizedUsers = accessData.authorizedUsers || [];
      
      authorizedUsers = authorizedUsers.filter(e => e !== email);
      await accessRef.child('authorizedUsers').set(authorizedUsers);
      
      openAccessControl(); // 重新載入列表
    }
  </script>
